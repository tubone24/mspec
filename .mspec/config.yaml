version: 1

# 成果物テンプレートと質問バンクの言語 (ISO 639-1)
locale: "ja"

# テスト実行コマンド (O2: 自動推定せず明示必須)
test:
  command: "pnpm --dir /Users/kagadminmac/project/mspec/packages/cli exec vitest run"
