version: 1
step: proposal
questions:
  - id: PRP-FS-001
    category: functional_scope
    when: always
    question: 主に解決したい課題は次のどれですか?
    options:
      - 既存機能の置き換え
      - 既存機能の拡張
      - 全く新規の機能
      - 不具合修正
    multi_select: false
    recommend_first: false

  - id: PRP-FS-002
    category: functional_scope
    when: "answers.PRP-FS-001 == '全く新規の機能'"
    question: 新規機能は既存どの capability に属しますか? (既存無しなら新規 capability を提案)
    options: dynamic

  - id: PRP-NG-001
    category: functional_scope
    when: always
    question: Non-Goal として明示的に外したいものは? (複数可)
    options:
      - パフォーマンス最適化
      - 国際化対応
      - アクセシビリティ
      - モバイル対応
      - 認証/認可の変更
    multi_select: true

  - id: PRP-TRM-001
    category: terminology
    when: always
    question: この機能で新たに導入する重要な用語はありますか?
    options: dynamic

  - id: PRP-UX-001
    category: ux
    when: always
    question: 想定する主なユーザータイプは?
    options:
      - エンドユーザー (一般)
      - 管理者
      - 開発者 (API 利用者)
      - 社内オペレーター

  - id: PRP-NFR-001
    category: nfr
    when: always
    question: 想定される最大ユーザー同時アクセス数は?
    options:
      - 〜10 (社内ツール)
      - 〜100
      - 〜1,000
      - 〜10,000 以上

  - id: PRP-NFR-002
    category: nfr
    when: always
    question: パフォーマンス要件として特に厳しいものは? (複数可)
    options:
      - 初回ロード時間 (LCP)
      - 操作応答時間 (INP)
      - スループット (req/s)
      - ストレージ消費量
      - メモリ消費量
    multi_select: true

  - id: PRP-CST-001
    category: constraints
    when: always
    question: 技術的・組織的に外せない制約は?
    options:
      - 既存 DB スキーマを変更不可
      - 既存 API 互換性を保つ
      - 既存ライブラリのみで実装
      - 特定ベンダーロックインを避ける
      - 制約なし

  - id: PRP-EDG-001
    category: edge_cases
    when: always
    question: エラー / 競合 / 境界条件として特に気にすべきものは?
    options:
      - 同時操作によるデータ競合
      - ネットワーク断/タイムアウト
      - 不正入力 / インジェクション
      - 容量超過 / 上限到達
      - 認証失効
    multi_select: true

  - id: PRP-CMP-001
    category: completion
    when: always
    question: 「完了した」と判定する具体的指標は? (複数可)
    options:
      - 全 E2E が green
      - ユーザー受入テスト合格
      - 本番投入後 24h 無障害
      - 開発者レビュー合格のみ
    multi_select: true

  # Security questions are now dynamically generated by mspec-security-analyzer subagent.
